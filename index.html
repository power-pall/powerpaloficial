<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerPal Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f2e032; --bg: #0b0e11; --card: #1e2329; --text-main: #ffffff; --text-dim: #848e9c; --nav-bg: #181a20; }
        body { background-color: var(--bg); color: var(--text-main); font-family: sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; min-height: 100vh; padding-bottom: 80px; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #auth-screen { display: block; padding: 60px 20px; text-align: center; }
        .logo { font-size: 42px; font-weight: 900; color: var(--gold); margin-bottom: 30px; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #474d57; background: var(--card); color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; font-size: 16px; }
        .btn-main { background: var(--gold); color: #000; width: 100%; padding: 18px; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: var(--nav-bg); display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid #2b3139; z-index: 100; }
        .nav-item { color: var(--text-dim); text-align: center; font-size: 12px; flex: 1; cursor: pointer; }
        .active { color: var(--gold); }
        .card-box { background: var(--card); padding: 25px; border-radius: 20px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="auth-screen">
        <div class="logo">PowerPal</div>
        <input type="tel" id="phone" placeholder="Телефонен номер (напр. 088...)">
        <input type="password" id="password" placeholder="Парола">
        <button class="btn-main" id="loginBtn">ВХОД / РЕГИСТРАЦИЯ</button>
    </div>

    <div id="page-home" class="page">
        <div class="logo" style="font-size: 24px; text-align: left;">PowerPal</div>
        <div class="card-box" style="border-left: 5px solid var(--gold); text-align: left;">
            <div style="color: var(--text-dim)">Общ Баланс</div>
            <div id="balance" style="font-size: 36px; font-weight: bold; margin-top: 5px;">€ 0.00</div>
        </div>
    </div>

    <div id="page-team" class="page">
        <h2>Моят Екип</h2>
        <div class="card-box">
            <div style="color: var(--text-dim)">Поканени партньори</div>
            <div id="invited" style="font-size: 50px; color: var(--gold); font-weight: bold; margin: 10px 0;">0</div>
            <div style="color: #02c076; font-size: 14px;"><i class="fa fa-check-circle"></i> Активен статус</div>
        </div>
    </div>

    <div class="nav-bar" id="nav">
        <div class="nav-item active" onclick="showPage('home', this)"><i class="fa fa-home" style="font-size: 20px; margin-bottom: 5px;"></i><br>Начало</div>
        <div class="nav-item" onclick="showPage('team', this)"><i class="fa fa-users" style="font-size: 20px; margin-bottom: 5px;"></i><br>Екип</div>
    </div>
</div>

<script type="module">
    // 1. Импортиране на нужните Firebase модули
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    // 2. Твоите точни данни за връзка
    const firebaseConfig = {
        apiKey: "AIzaSyASwS2MDuIRZas0vyFj12FzS3tl127Qjtw",
        authDomain: "powerpal-oficial.firebaseapp.com",
        databaseURL: "https://powerpal-oficial-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "powerpal-oficial",
        storageBucket: "powerpal-oficial.firebasestorage.app",
        messagingSenderId: "330467490708",
        appId: "1:330467490708:web:bb5bc023544d9921ebad81",
        measurementId: "G-MVRB5FN6GB"
    };

    // 3. Стартиране на Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 4. Логика за бутона ВХОД
    document.getElementById('loginBtn').onclick = async () => {
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value.trim();

        if(phone.length < 5 || password.length < 3) {
            alert("Моля, въведете валиден номер и парола!");
            return;
        }

        const userRef = ref(db, 'users/' + phone);

        try {
            // Проверяваме дали потребителят вече съществува
            const snapshot = await get(userRef);
            if (!snapshot.exists()) {
                // Ако е нов, го създаваме с 0 баланс
                await set(userRef, {
                    phone: phone,
                    password: password,
                    balance: 0,
                    invitedCount: 0
                });
            }

            // Скриваме логин екрана, показваме сайта
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('page-home').style.display = 'block';
            document.getElementById('nav').style.display = 'flex';

            // Започваме да следим данните му в реално време
            onValue(userRef, (s) => {
                const data = s.val();
                if(data) {
                    document.getElementById('balance').innerText = "€ " + (parseFloat(data.balance) || 0).toFixed(2);
                    document.getElementById('invited').innerText = data.invitedCount || 0;
                }
            });

        } catch (error) {
            console.error("Грешка:", error);
            alert("Грешка при свързване! Проверете дали сте натиснали Publish в таб Rules на Firebase.");
        }
    };

    // 5. Функция за навигация (смяна на страници)
    window.showPage = (pageId, element) => {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-' + pageId).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');
    };
</script>

</body>
</html>
